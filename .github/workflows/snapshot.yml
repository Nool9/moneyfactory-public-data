name: public snapshots

on:
  push:
    branches: [master]
    paths: [.github/workflows/snapshot.yml]
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: public-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803
        with:
          ref: master
      - run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - run: python -m unittest -v
      - id: due
        run: echo "capture=$(python -c 'import scrape_raw; print(str(scrape_raw.capture_due()).lower())')" >> "$GITHUB_OUTPUT"
      - if: steps.due.outputs.capture == 'true'
        run: python scrape.py
      - id: raw
        if: steps.due.outputs.capture == 'true'
        run: |
          manifest=$(python scrape_raw.py)
          slot=$(basename "$manifest" .json)
          archive="raw_${slot}_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}.tar.gz"
          tar -czf "$archive" -C raw .
          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "tag=raw-${slot:0:8}" >> "$GITHUB_OUTPUT"
      - env:
          GH_TOKEN: ${{ github.token }}
        if: steps.due.outputs.capture == 'true'
        run: |
          gh release view "${{ steps.raw.outputs.tag }}" >/dev/null 2>&1 || gh release create "${{ steps.raw.outputs.tag }}" --title "Raw snapshots ${{ steps.raw.outputs.tag }}" --notes "Append-only compressed 30-minute raw public API snapshots." || true
          gh release upload "${{ steps.raw.outputs.tag }}" "${{ steps.raw.outputs.archive }}"
      - if: steps.due.outputs.capture == 'true'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add snapshots current gaps
          git diff --cached --quiet || git commit -m "snapshot $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
